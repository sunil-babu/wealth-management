<!doctype html>
<html class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" id="theme-color-meta" content="#020617" />
    <meta name="color-scheme" content="light dark" />
    <title>Wealth App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Sync <html> class + theme-color before React hydrates to prevent flash
      (function() {
        var saved = localStorage.getItem('theme');
        var prefersDark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (!prefersDark) {
          document.documentElement.classList.remove('dark');
          var m = document.getElementById('theme-color-meta');
          if (m) m.setAttribute('content', '#f8fafc');
        }
      })();
    </script>
  </body>
</html>
